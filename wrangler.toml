# Cloudflare Worker (Static Assets) config for Boogi Bliss
# Serves public/ as static assets and routes /api/* through src/worker.js.
# Local dev: npx wrangler dev
# Deploys via the GitHub integration in the Cloudflare dashboard.

name = "boogibliss"
main = "src/worker.js"
compatibility_date = "2024-09-01"

[assets]
directory = "./public"
binding = "ASSETS"
not_found_handling = "single-page-application"

# Native Cloudflare email send binding.
# Function calls env.MAIL.send(...) — Cloudflare's infrastructure handles
# DKIM signing server-side. Restricted to the destination_address below.
[[send_email]]
name = "MAIL"
destination_address = "sheilia@thewayagency.com"  # MUST stay equal to TO_ADDRESS in src/worker.js — if these diverge, every send() throws and bookings 502.

# Enable Workers Logs so we can stream console output from the dashboard.
[observability]
enabled = true

[observability.logs]
enabled = true
invocation_logs = true
